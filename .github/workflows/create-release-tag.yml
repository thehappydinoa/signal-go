name: Create release tag

# Creates and pushes an annotated `v*` tag on the chosen ref. Pushing the
# tag triggers [release.yml](./release.yml) (build matrix + draft GitHub
# Release). Use [Release](./release.yml) workflow_dispatch for a dry-run
# without tagging.
#
# Maintainer checklist: update CHANGELOG.md, merge to main, run this workflow,
# then publish the draft release when the build finishes.
# See docs/guides/releasing.md.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer tag (e.g. 0.1.0-rc2 or v0.1.0-rc2)'
        required: true
        type: string
      ref:
        description: 'Branch or SHA to tag (must exist on origin)'
        required: false
        default: main
        type: string
      require_changelog:
        description: 'Fail if CHANGELOG.md lacks a ## [version] section'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: write # workflow_dispatch on release.yml (GITHUB_TOKEN tag push does not)

concurrency:
  group: create-release-tag
  cancel-in-progress: false

jobs:
  tag:
    name: Create and push tag
    runs-on: ubuntu-latest
    steps:
      # Pushing a tag with the default GITHUB_TOKEN does *not* trigger other
      # workflows (GitHub anti-recursion). Optional RELEASE_TAG_PUSH_TOKEN
      # (classic PAT, repo contents:write) makes `git push` behave like a
      # human push and auto-starts release.yml. Otherwise we dispatch Release
      # explicitly below.
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TAG_PUSH_TOKEN || github.token }}

      - name: Resolve version and tag name
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          raw='${{ inputs.version }}'
          raw="${raw#v}"
          if ! [[ "$raw" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid SemVer: '$raw' (expected MAJOR.MINOR.PATCH with optional -prerelease)"
            exit 1
          fi
          tag="v${raw}"
          echo "version=${raw}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${tag} on ref ${{ inputs.ref }}"

      - name: Verify CHANGELOG section
        if: inputs.require_changelog
        shell: bash
        run: |
          set -euo pipefail
          ver='${{ steps.meta.outputs.version }}'
          if grep -qF "## [${ver}]" CHANGELOG.md; then
            echo "CHANGELOG.md contains ## [${ver}]"
          else
            echo "::error::CHANGELOG.md is missing a ## [${ver}] section. Add release notes under [Unreleased], rename the heading, then re-run."
            exit 1
          fi

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.meta.outputs.tag }}'
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists on this checkout"
            exit 1
          fi
          if git ls-remote --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists on origin"
            exit 1
          fi

      - name: Create annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a '${{ steps.meta.outputs.tag }}' -m "Release ${{ steps.meta.outputs.tag }}"

      - name: Push tag to origin
        run: git push origin '${{ steps.meta.outputs.tag }}'

      - name: Trigger Release workflow
        if: ${{ secrets.RELEASE_TAG_PUSH_TOKEN == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag='${{ steps.meta.outputs.tag }}'
          echo "Tag was pushed with GITHUB_TOKEN — dispatching Release on ref ${tag}"
          gh workflow run release.yml --repo "${{ github.repository }}" --ref "${tag}"
          echo "Waiting for Release run to appear…"
          sleep 10
          gh run list --repo "${{ github.repository }}" --workflow=release.yml --limit 3

      - name: Summary
        run: |
          {
            echo "### Release tag pushed"
            echo ""
            echo "- **Tag:** \`${{ steps.meta.outputs.tag }}\`"
            echo "- **Ref:** \`${{ inputs.ref }}\`"
            echo "- **Version:** \`${{ steps.meta.outputs.version }}\`"
            echo ""
            if [ -n "${{ secrets.RELEASE_TAG_PUSH_TOKEN }}" ]; then
              echo "Release should start automatically (tag pushed with RELEASE_TAG_PUSH_TOKEN)."
            else
              echo "Release was dispatched via workflow_dispatch (GITHUB_TOKEN tag pushes do not trigger other workflows)."
            fi
            echo ""
            echo "Track: [Release workflow](https://github.com/${{ github.repository }}/actions/workflows/release.yml)"
            echo "When it finishes, open the **draft** GitHub Release, verify assets + notes, then click **Publish release**."
          } >> "$GITHUB_STEP_SUMMARY"
