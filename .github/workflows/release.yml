name: Release

# Build and publish `signal-go` binaries on every tag push that looks like
# a SemVer release tag (`v0.1.0`, `v1.2.3-rc1`, ...).
#
# To cut a real release: run the "Create release tag" workflow
# (create-release-tag.yml), which pushes a v* tag and triggers this file.
#
# `workflow_dispatch` here is a dry-run only — no tag, no draft GitHub
# Release; artifacts stay on the workflow run (7-day retention).
#
# See ADR 0033 and docs/guides/releasing.md.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Synthetic version tag for dry-run artifacts (e.g. v0.0.0-dryrun)'
        required: false
        default: 'v0.0.0-dryrun'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # softprops/action-gh-release uploads assets
  id-token: write       # actions/attest-build-provenance signs Sigstore envelopes
  attestations: write   # ditto — records the attestation on the run

env:
  GO_VERSION: '1.25'
  # Resolved version string used in archive names. `${{ github.ref_name }}`
  # is the tag for `on.push.tags` events; manual dispatch falls back to the
  # `tag` input.
  RELEASE_VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.os_name }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      # Keep going if a single platform fails; we still want the other
      # archives published so a maintainer can ship a partial release if
      # a stubborn platform breaks.
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_name: linux
            arch: amd64
            cargo_target: ''            # use host default (x86_64-unknown-linux-gnu)
            cache_key_suffix: ubuntu-latest-x86_64
            archive: tar.gz
            experimental: false
          - runner: ubuntu-24.04-arm
            os_name: linux
            arch: arm64
            cargo_target: ''            # use host default (aarch64-unknown-linux-gnu)
            cache_key_suffix: ubuntu-24.04-arm-aarch64
            archive: tar.gz
            experimental: false
          - runner: macos-15-intel
            os_name: darwin
            arch: amd64
            cargo_target: ''            # use host default (x86_64-apple-darwin)
            cache_key_suffix: macos-15-intel-x86_64
            archive: tar.gz
            experimental: false
          - runner: macos-latest
            os_name: darwin
            arch: arm64
            cargo_target: ''            # use host default (aarch64-apple-darwin)
            cache_key_suffix: macos-latest-aarch64
            archive: tar.gz
            experimental: false
          - runner: windows-latest
            os_name: windows
            arch: amd64
            cargo_target: x86_64-pc-windows-gnu
            cache_key_suffix: windows-latest-x86_64-gnu
            archive: zip
            # Windows runs against MinGW-w64 so cgo can link the static
            # archive. BoringSSL upstream prefers MSVC; mark this leg as
            # experimental until we've shipped a clean release from it.
            experimental: true

    steps:
      - uses: actions/checkout@v6

      - name: Read pinned libsignal version
        id: version
        shell: bash
        run: |
          # Portable BRE sed (works on both BSD sed on macOS and GNU sed
          # on Linux) — release.yml builds across both ecosystems, so no
          # `grep -oP` here.
          v=$(sed -n 's/^LIBSIGNAL_VERSION="${LIBSIGNAL_VERSION:-\([^}]*\)}".*/\1/p' scripts/build-libsignal.sh)
          if [ -z "$v" ]; then
            echo "Could not extract LIBSIGNAL_VERSION from scripts/build-libsignal.sh" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "libsignal pinned at: $v"

      - name: Cache libsignal_ffi.a
        id: cache-libsignal
        uses: actions/cache@v5
        with:
          path: internal/libsignal/lib
          key: libsignal-${{ steps.version.outputs.version }}-${{ matrix.cache_key_suffix }}-v1

      # ---------------- BoringSSL deps (nasm) ----------------
      # protoc is handled cross-platform by arduino/setup-protoc below;
      # we still need nasm (for BoringSSL's hand-written assembly) from
      # the host package manager because no comparable cross-platform
      # action exists. Linux runners ship nasm in the runner image.
      - name: (macOS) Install nasm
        if: matrix.os_name == 'darwin' && steps.cache-libsignal.outputs.cache-hit != 'true'
        run: brew install nasm

      - name: (Windows) Install MSYS2 / MinGW-w64
        if: matrix.os_name == 'windows' && steps.cache-libsignal.outputs.cache-hit != 'true'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            git

      - name: (Windows) Expose MinGW on PATH
        if: matrix.os_name == 'windows'
        shell: bash
        run: |
          # Put MSYS2's MinGW-w64 bin first so cgo + cargo build agree on
          # the gcc/g++ that link the static archive.
          echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"
          echo "C:/msys64/usr/bin" >> "$GITHUB_PATH"

      # ---------------- protoc (cross-platform) ----------------
      # libsignal's `spqr` (Sparse Post Quantum Ratchet) crate's
      # build.rs uses prost-build, which shells out to `protoc`.
      # Sourcing protoc from each host's package manager (apt /
      # brew / pacman) ran into per-platform path-discovery issues
      # (macOS brew didn't end up with /usr/local/bin/protoc on PATH
      # for cargo's child processes; Windows MSYS2 protoc was on
      # GITHUB_PATH but the Win32 cargo lookup missed it). Using
      # arduino/setup-protoc gives us one tool-cache binary on every
      # runner, plus an output we can wire into the `PROTOC` env
      # explicitly so prost-build never has to PATH-search.
      - name: Install protoc
        id: protoc
        if: steps.cache-libsignal.outputs.cache-hit != 'true'
        uses: arduino/setup-protoc@v3
        with:
          # Pinned `repo-token` avoids the unauthenticated rate limit
          # on the protobuf releases API when setup-protoc resolves
          # the `23.x` default.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify protoc resolves
        if: steps.cache-libsignal.outputs.cache-hit != 'true'
        shell: bash
        env:
          PROTOC: ${{ steps.protoc.outputs.path }}/bin/protoc${{ matrix.os_name == 'windows' && '.exe' || '' }}
        run: |
          # If this step fails the libsignal build would have failed
          # with a less direct error from prost-build; surfacing
          # protoc's location explicitly is much easier to debug.
          echo "PROTOC=${PROTOC}"
          test -x "${PROTOC}" || { echo "PROTOC not executable: ${PROTOC}"; ls -la "$(dirname "${PROTOC}")" || true; exit 1; }
          "${PROTOC}" --version
          command -v protoc || echo "(protoc not on PATH, but PROTOC env will be used by prost-build)"

      # ---------------- Rust ----------------
      - name: Install Rust toolchain
        if: steps.cache-libsignal.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      # ---------------- Build libsignal ----------------
      - name: Build libsignal_ffi.a
        if: steps.cache-libsignal.outputs.cache-hit != 'true'
        shell: bash
        env:
          LIBSIGNAL_VERSION: ${{ steps.version.outputs.version }}
          CARGO_TARGET: ${{ matrix.cargo_target }}
          # On cloud VMs clang can fail to find -lstdc++; force gcc.
          CC: gcc
          CXX: g++
          # Point prost-build at the tool-cache protoc that
          # setup-protoc just installed, so the cargo child-process
          # lookup never has to PATH-resolve (which is what bit us
          # on macOS and Windows in the previous two dry-runs).
          PROTOC: ${{ steps.protoc.outputs.path }}/bin/protoc${{ matrix.os_name == 'windows' && '.exe' || '' }}
        run: bash scripts/build-libsignal.sh

      # ---------------- Go ----------------
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build signal-go binary
        shell: bash
        env:
          CGO_ENABLED: '1'
          # On Windows we need to pin cgo to MinGW gcc; on linux/darwin
          # the auto-detected toolchain is fine.
          CC: ${{ matrix.os_name == 'windows' && 'gcc' || '' }}
          CXX: ${{ matrix.os_name == 'windows' && 'g++' || '' }}
        run: |
          ext=""
          if [ "${{ matrix.os_name }}" = "windows" ]; then ext=".exe"; fi
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.version=${RELEASE_VERSION}" \
            -o "dist/signal-go${ext}" ./cmd/signal-go

      - name: Smoke-test binary
        shell: bash
        run: |
          ext=""
          if [ "${{ matrix.os_name }}" = "windows" ]; then ext=".exe"; fi
          "./dist/signal-go${ext}" --help

      # ---------------- Package ----------------
      - name: Package archive
        id: package
        shell: bash
        run: |
          name="signal-go-${RELEASE_VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}"
          stage="dist/${name}"
          mkdir -p "${stage}"
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            cp dist/signal-go.exe "${stage}/"
          else
            cp dist/signal-go "${stage}/"
          fi
          cp LICENSE NOTICE README.md "${stage}/"
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            # 7z is pre-installed on windows-latest; produces a clean zip
            # without absolute paths.
            7z a -tzip "${name}.zip" "${name}" >/dev/null
            sha256sum "${name}.zip" > "${name}.zip.sha256"
            echo "archive_path=dist/${name}.zip" >> "$GITHUB_OUTPUT"
            echo "sha256_path=dist/${name}.zip.sha256" >> "$GITHUB_OUTPUT"
          else
            tar -czf "${name}.tar.gz" "${name}"
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
            echo "archive_path=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
            echo "sha256_path=dist/${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          fi

      # SLSA build provenance — issued only for real tag releases, not
      # workflow_dispatch dry-runs. Two gates:
      #
      # 1. `refs/tags/v*` — Sigstore refuses to attest a ref that
      #    isn't on the default branch / a tag anyway; gating here
      #    avoids confusing failures during dry-runs.
      # 2. Repo variable `ENABLE_BUILD_PROVENANCE == 'true'` — GitHub's
      #    Artifact Attestations feature is *not available for
      #    user-owned private repositories* and returns
      #
      #      Failed to persist attestation: Feature not available
      #      for user-owned private repositories.
      #
      #    To enable: make the repo public (or move it to an org plan
      #    that supports attestations), then set the repo variable
      #    `ENABLE_BUILD_PROVENANCE` to `true` under
      #    Settings → Secrets and variables → Actions → Variables.
      #    `continue-on-error: true` is belt-and-suspenders: even if
      #    the feature is somehow enabled but a transient Sigstore
      #    issue surfaces, a single archive still lands on the draft
      #    release.
      - name: Attest build provenance
        if: ${{ startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_BUILD_PROVENANCE == 'true' }}
        continue-on-error: true
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.package.outputs.archive_path }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: signal-go-${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.sha256_path }}
          retention-days: 7
          if-no-files-found: error

    # `experimental` legs must not fail the matrix.
    continue-on-error: ${{ matrix.experimental }}

  publish:
    name: Publish GitHub Release
    needs: build
    # Tag pushes produce a real release; manual dispatch leaves artifacts
    # on the workflow run only.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        id: collect
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -print -exec cp -v {} release/ \;
          ls -la release/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/*
