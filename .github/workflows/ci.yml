name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: '1.25'

jobs:
  # Builds libsignal_ffi.a (or restores from cache) and uploads it as a
  # workflow artifact. Downstream jobs download instead of rebuilding.
  # See ADR 0013 for the caching rationale.
  libsignal:
    name: Build libsignal_ffi.a
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - id: version
        name: Read pinned libsignal version
        run: |
          # Portable BRE sed (BSD + GNU). Avoids `grep -oP`, which is a
          # GNU extension and breaks on macOS runners (see release.yml).
          v=$(sed -n 's/^LIBSIGNAL_VERSION="${LIBSIGNAL_VERSION:-\([^}]*\)}".*/\1/p' scripts/build-libsignal.sh)
          if [ -z "$v" ]; then
            echo "Could not extract LIBSIGNAL_VERSION from scripts/build-libsignal.sh" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "libsignal pinned at: $v"

      - id: cache
        uses: actions/cache@v5
        with:
          path: internal/libsignal/lib
          key: libsignal-${{ steps.version.outputs.version }}-ubuntu-latest-x86_64-v1

      - name: Install Rust toolchain
        if: steps.cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        if: steps.cache.outputs.cache-hit != 'true'
        # spqr (upstream sparse PQ ratchet) uses prost-build, which calls
        # protoc at *Rust crate build* time. Distinct from our own
        # `task proto` use of protoc to generate Go from .proto files.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build libsignal_ffi.a
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          LIBSIGNAL_VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/build-libsignal.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libsignal_ffi-linux-amd64-${{ steps.version.outputs.version }}
          path: internal/libsignal/lib/libsignal_ffi.a
          retention-days: 1
          if-no-files-found: error

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    needs: libsignal
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: golangci/golangci-lint-action@v9
        with:
          # Pinned to golangci-lint v2: golangci-lint refuses to lint
          # a `go 1.25` module if the binary was built with an older
          # Go (our go.mod targets 1.25 via x/crypto). v2 binaries are
          # built with go1.25+. The action major must be v7+ to install
          # v2; v6 only knows about v1.x releases.
          version: v2.12.2
          args: --config .golangci.yml

  vet:
    name: go vet
    runs-on: ubuntu-latest
    needs: libsignal
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - run: go vet ./...

  test:
    name: Test (race)
    runs-on: ubuntu-latest
    needs: libsignal
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - run: go test -race -count=1 ./...

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    needs: libsignal
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        # Skip generated proto packages — autogen code is exempt from
        # staticcheck per ADR 0006 testing strategy.
        run: |
          PKGS=$(go list ./... | grep -v 'internal/proto/gen')
          staticcheck $PKGS

  cover:
    name: Coverage
    runs-on: ubuntu-latest
    needs: libsignal
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - run: go test -count=1 -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out | tail -1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: libsignal
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - run: go build -trimpath -o bin/signal-go ./cmd/signal-go

      - name: Quick smoke-test the binary
        run: |
          ./bin/signal-go --help
          # Subcommand help also wires properly:
          ./bin/signal-go link --help 2>&1 || true

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    needs: libsignal
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
