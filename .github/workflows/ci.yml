name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: '1.25.11'

jobs:
  detect_changes:
    name: Detect CI-relevant changes
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.detect.outputs.run_ci }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: detect
        name: Check changed paths
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            pull_request)
              base="$PR_BASE_SHA"
              head="$PR_HEAD_SHA"
              ;;
            push)
              base="$PUSH_BEFORE_SHA"
              head="$PUSH_AFTER_SHA"
              ;;
            *)
              # Defensive default: run full CI for unknown events.
              echo "run_ci=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          # First push on a branch may not have a usable parent SHA.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "run_ci=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base" "$head")"

          if [ -n "$changed_files" ]; then
            echo "Changed files between $base and $head:"
            echo "$changed_files"
          else
            echo "No changed files detected between $base and $head."
          fi

          if echo "$changed_files" | grep -Eq '^(\.github/workflows/ci\.yml|\.golangci\.yml|Taskfile\.yml|go\.mod|go\.sum|cmd/|internal/|pkg/|proto/|scripts/)'; then
            echo "run_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: CI scope summary
        run: |
          if [ "${{ steps.detect.outputs.run_ci }}" = "true" ]; then
            echo "Running full CI: CI-relevant files changed."
          else
            echo "Skipping heavy CI jobs: no CI-relevant files changed."
          fi

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        # SC2034 (unused var) fires on variables exported for child scripts;
        # SC1091 (not following source) fires on sourced helpers — both are
        # intentional patterns in this repo.
        run: |
          shellcheck --severity=warning --exclude=SC2034,SC1091 \
            scripts/*.sh .githooks/pre-push

  # Builds libsignal_ffi.a (or restores from cache) and uploads it as a
  # workflow artifact. Downstream jobs download instead of rebuilding.
  # See ADR 0013 for the caching rationale.
  libsignal:
    name: Build libsignal_ffi.a
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_ci == 'true'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - id: version
        name: Read pinned libsignal version
        run: |
          # Portable BRE sed (BSD + GNU). Avoids `grep -oP`, which is a
          # GNU extension and breaks on macOS runners (see release.yml).
          v=$(sed -n 's/^LIBSIGNAL_VERSION="${LIBSIGNAL_VERSION:-\([^}]*\)}".*/\1/p' scripts/build-libsignal.sh)
          if [ -z "$v" ]; then
            echo "Could not extract LIBSIGNAL_VERSION from scripts/build-libsignal.sh" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "libsignal pinned at: $v"

      - id: cache
        uses: actions/cache@v6
        with:
          path: internal/libsignal/lib
          key: libsignal-${{ steps.version.outputs.version }}-ubuntu-latest-x86_64-v1

      - name: Install Rust toolchain
        if: steps.cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        id: protoc
        if: steps.cache.outputs.cache-hit != 'true'
        # spqr (upstream sparse PQ ratchet) uses prost-build, which calls
        # protoc at *Rust crate build* time. Distinct from our own
        # `task proto` use of protoc to generate Go from .proto files.
        # Use arduino/setup-protoc (same as libsignal-artifacts.yml) rather
        # than the older system package from apt to avoid version mismatches.
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build libsignal_ffi.a
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          LIBSIGNAL_VERSION: ${{ steps.version.outputs.version }}
          PROTOC: ${{ steps.protoc.outputs.path }}/bin/protoc
        run: bash scripts/build-libsignal.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libsignal_ffi-linux-amd64-${{ steps.version.outputs.version }}
          path: internal/libsignal/lib/libsignal_ffi.a
          retention-days: 1
          if-no-files-found: error

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    needs: [detect_changes, libsignal]
    if: needs.detect_changes.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v8
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: golangci/golangci-lint-action@v9
        with:
          # Pinned to golangci-lint v2: golangci-lint refuses to lint
          # a `go 1.25` module if the binary was built with an older
          # Go (our go.mod targets 1.25 via x/crypto). v2 binaries are
          # built with go1.25+. The action major must be v7+ to install
          # v2; v6 only knows about v1.x releases.
          version: v2.12.2
          args: --config .golangci.yml

  vet:
    name: go vet
    runs-on: ubuntu-latest
    needs: [detect_changes, libsignal]
    if: needs.detect_changes.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v8
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - run: go vet ./...

  test:
    name: Test (race)
    runs-on: ubuntu-latest
    needs: [detect_changes, libsignal]
    if: needs.detect_changes.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v8
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - run: go test -race -count=1 ./...

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    needs: [detect_changes, libsignal]
    if: needs.detect_changes.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v8
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        # Skip generated proto packages — autogen code is exempt from
        # staticcheck per ADR 0006 testing strategy.
        run: |
          PKGS=$(go list ./... | grep -v 'internal/proto/gen')
          staticcheck $PKGS

  cover:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [detect_changes, libsignal]
    if: needs.detect_changes.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v8
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - run: go test -count=1 -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out | tail -1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [detect_changes, libsignal]
    if: needs.detect_changes.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v8
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - run: go build -trimpath -o bin/signal-go ./cmd/signal-go

      - name: Quick smoke-test the binary
        run: |
          ./bin/signal-go --help
          # Subcommand help also wires properly:
          ./bin/signal-go link --help 2>&1 || true

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    needs: [detect_changes, libsignal]
    if: needs.detect_changes.outputs.run_ci == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v8
        with:
          name: libsignal_ffi-linux-amd64-${{ needs.libsignal.outputs.version }}
          path: internal/libsignal/lib

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  docs_check:
    name: Docs freshness check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Warn if API-visible files changed without docs update
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/check-docs-touched.sh "$BASE_SHA"
