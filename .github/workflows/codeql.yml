name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays at 06:30 UTC — when the lights are off and the
    # queue is short.
    - cron: '30 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

# CodeQL doesn't need libsignal_ffi.a to do its analysis (it analyses
# our Go source, not the linked C library), so we skip the
# build-libsignal dance and let CodeQL run `go build` in its default
# autobuild mode. If that breaks because of the missing static lib,
# we'll fall back to a manual build step that downloads the artifact
# from the latest CI run.
jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          # `security-extended` enables the broader query set; we can
          # tighten later if it gets noisy.
          queries: security-extended

      # CodeQL's autobuild runs `go build`, which needs libsignal_ffi.a.
      # Build (or restore-from-cache) just like the main CI does.
      - id: version
        run: |
          v=$(grep -oP 'LIBSIGNAL_VERSION="\$\{LIBSIGNAL_VERSION:-\K[^"}]+' scripts/build-libsignal.sh)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - id: cache
        uses: actions/cache@v4
        with:
          path: internal/libsignal/lib
          key: libsignal-${{ steps.version.outputs.version }}-ubuntu-latest-x86_64-v1

      - name: Install Rust toolchain
        if: steps.cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build libsignal_ffi.a
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          LIBSIGNAL_VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/build-libsignal.sh

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:go'
