name: Bug report
description: Report reproducible defects in signal-go
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do not include vulnerability details here.
        For security issues, use SECURITY.md.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands and inputs.
      placeholder: |
        1. Run ...
        2. Link with ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and output
      description: Paste full command output and stack traces.
      render: shell

  - type: input
    id: go_version
    attributes:
      label: Go version
      placeholder: go1.25.x
    validations:
      required: true

  - type: input
    id: os_arch
    attributes:
      label: OS and architecture
      placeholder: linux/amd64, darwin/arm64, windows/amd64
    validations:
      required: true

  - type: dropdown
    id: libsignal_built
    attributes:
      label: libsignal_ffi.a built?
      options:
        - "yes"
        - "no"
        - "not sure"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit or tag
      placeholder: main@<sha> or v0.x.y
