version: '3'

dotenv: ['.env']

vars:
  LIBSIGNAL_VERSION: v0.94.1
  # -trimpath only for build outputs (reproducibility + no dev paths in binaries).
  # Tests don't need it and it breaks cgo preprocessing on Windows (Go cgo/trimpath
  # interaction bug on windows/amd64 with go test).
  BUILDFLAGS: -trimpath
  # Race detector: enabled everywhere except Windows, where ThreadSanitizer cannot
  # allocate its shadow memory (ERROR_INVALID_PARAMETER / error code 87).
  _GOOS:
    sh: go env GOOS
  RACE: '{{if ne ._GOOS "windows"}}-race{{end}}'
  COVER_THRESHOLD: 0  # tighten as we grow; ADR 0006 target is 80%

env:
  CGO_ENABLED: '1'
  # cgo tasks run via scripts/with-dev-env.sh (prepends MSYS2 mingw64 on Windows).
  # Bare CC/CXX names for ad-hoc `go` invocations outside Task; do not use
  # /c/msys64/... absolute paths — Go 1.25 cgo on Windows rejects them.
  CC:
    sh: bash -c 'source scripts/dev-env.sh 2>/dev/null && echo "${CC:-gcc}"'
  CXX:
    sh: bash -c 'source scripts/dev-env.sh 2>/dev/null && echo "${CXX:-g++}"'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  setup:
    desc: Install dev tools (protoc-gen-go, golangci-lint) and git hooks
    cmds:
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - command -v golangci-lint >/dev/null || go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - command -v protoc      >/dev/null || (echo "Install protoc from your distro (e.g. apt install protobuf-compiler)" && exit 1)
      - command -v cargo       >/dev/null || (echo "Install Rust (https://rustup.rs) — needed once to build libsignal" && exit 1)
      - task: hooks:install

  hooks:install:
    desc: Point git at the versioned hooks in .githooks/ (run once per clone)
    cmds:
      - git config core.hooksPath .githooks
      - 'echo "Git hooks installed. Pre-push checks: vet, lint, test."'

  libsignal:
    desc: Obtain libsignal_ffi.a — downloads pre-built artifact if available, otherwise builds from source (requires Rust)
    sources:
      - scripts/build-libsignal.sh
      - scripts/download-libsignal.sh
    generates:
      - internal/libsignal/lib/libsignal_ffi.a
      - internal/libsignal/include/signal_ffi.h
    cmds:
      - LIBSIGNAL_VERSION={{.LIBSIGNAL_VERSION}} bash scripts/build-libsignal.sh

  libsignal:download:
    desc: Download pre-built libsignal_ffi.a from GitHub Releases (no Rust required; fails if no artifact exists yet)
    cmds:
      - LIBSIGNAL_VERSION={{.LIBSIGNAL_VERSION}} bash scripts/download-libsignal.sh

  proto:
    desc: Regenerate Go from vendored .proto files
    sources:
      - proto/*.proto
      - scripts/gen-proto.sh
    generates:
      - internal/proto/gen/**/*.pb.go
    cmds:
      - bash scripts/gen-proto.sh

  build:
    desc: Build all packages and the demo CLI (binary at bin/signal-go)
    deps: [libsignal]
    cmds:
      - bash scripts/with-dev-env.sh go build {{.BUILDFLAGS}} ./...
      - bash scripts/with-dev-env.sh go build {{.BUILDFLAGS}} -o bin/signal-go ./cmd/signal-go

  test:
    desc: Run unit tests
    deps: [libsignal]
    cmds:
      - bash scripts/with-dev-env.sh go test {{.RACE}} -count=1 ./...

  test:component:
    desc: Run component tests (require fake Signal server)
    deps: [libsignal]
    cmds:
      - bash scripts/with-dev-env.sh go test {{.RACE}} -count=1 -tags=component ./...

  test:e2e:
    desc: Run end-to-end tests against real chat.signal.org (excludes interactive link/group-create)
    deps: [libsignal]
    env:
      SIGNAL_GO_E2E: '1'
      GOTMPDIR: ./.build/tmp
      TMPDIR: ./.build/tmp
      TMP: ./.build/tmp
      TEMP: ./.build/tmp
    cmds:
      - mkdir -p .build/tmp
      - bash scripts/with-dev-env.sh go test {{.RACE}} -count=1 -tags=e2e -timeout=10m -run 'TestE2E_(Open|Send|Recv|GroupManagement)$' ./...

  test:e2e:link:
    desc: Interactive e2e device link (requires empty SIGNAL_E2E_STORE_DIR; sets SIGNAL_E2E_LINK=1)
    deps: [libsignal]
    env:
      SIGNAL_GO_E2E: '1'
      SIGNAL_E2E_LINK: '1'
      GOTMPDIR: ./.build/tmp
      TMPDIR: ./.build/tmp
      TMP: ./.build/tmp
      TEMP: ./.build/tmp
    cmds:
      - mkdir -p .build/tmp
      - bash scripts/with-dev-env.sh go test {{.RACE}} -count=1 -tags=e2e -timeout=15m -run '^TestE2E_Link$' ./pkg/signal/...

  test:e2e:group:
    desc: Interactive e2e group create/join + bidirectional chat via invite link (runs with -v)
    deps: [libsignal]
    env:
      SIGNAL_GO_E2E: '1'
      SIGNAL_E2E_GROUP_INTERACTIVE: '1'
      GOTMPDIR: ./.build/tmp
      TMPDIR: ./.build/tmp
      TMP: ./.build/tmp
      TEMP: ./.build/tmp
    cmds:
      - mkdir -p .build/tmp
      - bash scripts/with-dev-env.sh go test {{.RACE}} -v -count=1 -tags=e2e -timeout=15m -run '^TestE2E_GroupCreateAndChat$' ./pkg/signal/...

  cover:
    desc: Run tests with coverage report
    deps: [libsignal]
    cmds:
      - |
        rm -f coverage.out coverage.tmp
        echo "mode: atomic" > coverage.out
        for pkg in $(bash scripts/with-dev-env.sh go list -f '{{`{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}`}}' ./...); do
          bash scripts/with-dev-env.sh go test {{.RACE}} -count=1 -coverprofile=coverage.tmp -covermode=atomic "$pkg"
          if [ -f coverage.tmp ]; then
            tail -n +2 coverage.tmp >> coverage.out
            rm coverage.tmp
          fi
        done
      - go tool cover -func=coverage.out | tail -1

  lint:
    desc: Run golangci-lint
    deps: [libsignal]
    cmds:
      - bash scripts/with-dev-env.sh golangci-lint run ./...

  lint:shell:
    desc: Run shellcheck on all shell scripts (Linux + macOS portability)
    cmds:
      - command -v shellcheck >/dev/null || (echo "Install shellcheck: brew install shellcheck / apt-get install shellcheck" && exit 1)
      - shellcheck --severity=warning --exclude=SC2034,SC1091 scripts/*.sh .githooks/pre-push

  staticcheck:
    desc: Run staticcheck (Phase 8 audit gate)
    deps: [libsignal]
    cmds:
      - |
        command -v staticcheck >/dev/null || bash scripts/with-dev-env.sh go install honnef.co/go/tools/cmd/staticcheck@latest
        PKGS=$(bash scripts/with-dev-env.sh go list ./... | grep -v 'internal/proto/gen')
        staticcheck $PKGS

  fuzz:
    desc: Run every Go fuzz target for a short local budget
    deps: [libsignal]
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - |
        targets=$(go test -list '^Fuzz' ./... 2>/dev/null | awk '/^Fuzz/ {print pkg":"$0} /^ok|^---|^FAIL/ {} /signal-go/ {pkg=$0}')
        # Fallback when -list isn't supported; iterate the known list.
        for entry in \
            internal/provisioning:FuzzDecryptEnvelope \
            internal/provisioning:FuzzPKCS7Unpad ; do
          pkg=$(echo "$entry" | cut -d: -f1); fn=$(echo "$entry" | cut -d: -f2)
          echo ">> fuzzing $pkg::$fn for {{.FUZZTIME}}"
          bash scripts/with-dev-env.sh go test -run='^$' -fuzz="^${fn}$" -fuzztime={{.FUZZTIME}} ./$pkg
        done

  fmt:
    desc: Format Go code (gofumpt + goimports via golangci-lint; requires LF line endings)
    deps: [setup]
    cmds:
      - golangci-lint fmt ./...

  tidy:
    desc: go mod tidy
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts (does not touch the libsignal clone cache)
    cmds:
      - rm -rf coverage.out internal/libsignal/lib/libsignal_ffi.a internal/libsignal/lib/.version
      - find . -name '*.test' -delete

  clean:all:
    desc: Remove everything, including the libsignal clone (forces a rebuild)
    cmds:
      - task: clean
      - rm -rf .build

  ci:
    desc: Run the full CI pipeline locally
    cmds:
      - task: setup
      - task: libsignal
      - task: proto
      - task: lint
      - task: staticcheck
      - task: test
      - task: cover
