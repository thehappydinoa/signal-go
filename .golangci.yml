version: "2"
run:
  build-tags:
    - component
    - e2e
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    gocritic:
      # cgo expansions trip dupSubExpr for legitimate `err != nil` checks
      # on every C.signal_* call. Disable globally; the legitimate cases
      # the check finds are caught by govet anyway.
      disabled-checks:
        - dupSubExpr
    gocyclo:
      min-complexity: 20
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: var-naming
        - name: package-comments
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gocritic
          - gocyclo
        path: _test\.go
      - linters:
          - errcheck
          - gocritic
          - gocyclo
          - govet
          - revive
          - staticcheck
          - unused
        path: internal/proto/gen/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/thehappydinoa/signal-go
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
