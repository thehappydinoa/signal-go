# golangci-lint configuration
# See https://golangci-lint.run/usage/configuration/
run:
  timeout: 5m
  tests: true
  build-tags:
    - component
    - e2e
  # The libsignal Rust workspace also contains test fixtures written in Go;
  # they live under .build/ when we clone it locally. Don't lint them.
  skip-dirs:
    - .build
    - internal/proto/gen

linters:
  disable-all: true
  enable:
    # Defaults
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style / correctness
    - bodyclose
    - errorlint
    - gocritic
    - goimports
    - misspell
    - nilerr
    - nolintlint
    - predeclared
    - revive
    - unconvert
    - unparam
    - whitespace
    # Concurrency
    - copyloopvar
    - prealloc
    # Code health
    - gocyclo
    - gofumpt

linters-settings:
  goimports:
    local-prefixes: github.com/thehappydinoa/signal-go
  gocyclo:
    min-complexity: 20
  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck
      - name: var-naming
      - name: package-comments
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
        disabled: true  # too noisy on interface impls

issues:
  exclude-rules:
    # Allow long, descriptive test names and complex test setups
    - path: _test\.go
      linters: [gocyclo, gocritic]
    # Generated protobuf code
    - path: internal/proto/gen/
      linters: [revive, gocritic, gosimple, staticcheck, unused, gocyclo, errcheck, govet]
  max-issues-per-linter: 0
  max-same-issues: 0
